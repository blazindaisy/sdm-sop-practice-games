<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Organized Practice Learning Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Open Sans", -apple-system, sans-serif;
  background: #f7f4ef;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Hero ────────────────────────────────────── */
main {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.hero {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: stretch;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 3.5rem;
  gap: 3rem;
  width: 100%;
}

/* ── Left column ─────────────────────────────── */
.hero-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 1.5rem;
}

.hero-heading {
  font-family: "Raleway", sans-serif;
  font-weight: 800;
  font-size: 3.5rem;
  line-height: 1.08;
  color: #111111;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  max-width: 420px;
}

.hero-subtitle {
  font-size: 1.1rem;
  font-weight: 400;
  color: #2d3142;
  line-height: 1.65;
  max-width: 420px;
}

.nav-buttons {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-top: 0.75rem;
  max-width: 420px;
}

.nav-btn {
  display: block;
  background: #111111;
  color: #ffffff;
  text-decoration: none;
  text-align: center;
  font-family: "Open Sans", sans-serif;
  font-weight: 600;
  font-size: 1rem;
  padding: 1rem 2rem;
  border-radius: 100px;
  transition: background 0.15s, transform 0.12s;
}

.nav-btn:hover {
  background: #333333;
  transform: translateY(-1px);
}

.nav-btn:focus-visible {
  outline: 3px solid #8c4a2f;
  outline-offset: 3px;
}

/* ── Right column ────────────────────────────── */
.hero-right {
  flex: 0 0 46%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Image sizes naturally from its width (image is ~square, so height ≈ width).
   This keeps it visually the same height as the left content block. */
.hero-illustration {
  width: 100%;
  height: auto;
  max-height: 100%;
  object-fit: contain;
  display: block;
}

/* ── Footer ──────────────────────────────────── */
footer {
  text-align: center;
  padding: 1rem 1.5rem;
  font-size: 0.75rem;
  color: #5c5649;
  border-top: 1px solid #e0dbd3;
  flex-shrink: 0;
}

/* ── Responsive ──────────────────────────────── */
@media (max-width: 820px) {
  body {
    height: auto;
    overflow: auto;
    min-height: 100vh;
  }

  .hero {
    flex-direction: column-reverse;
    padding: 2.5rem 2rem;
    gap: 1.5rem;
    align-items: center;
  }

  .hero-left {
    width: 100%;
    justify-content: flex-start;
  }

  .hero-right {
    flex: none;
    width: 100%;
  }

  .hero-illustration {
    max-height: 260px;
  }

  .nav-buttons,
  .hero-subtitle {
    max-width: 100%;
  }
}

@media (max-width: 480px) {
  .hero { padding: 2rem 1.25rem; }
  .hero-heading { font-size: 2.4rem; }
  .hero-subtitle { font-size: 1rem; }
  .nav-btn { font-size: 0.9375rem; padding: 0.875rem 1.5rem; }
}
</style>
</head>
<body>

<main>
  <div class="hero">

    <div class="hero-left">
      <h1 class="hero-heading">Safety Organized Practice Learning Games</h1>
      <p class="hero-subtitle">Interactive learning tools for child welfare trainers and coaches</p>
      <nav class="nav-buttons" aria-label="Site sections">
        <a href="games.html" class="nav-btn">Games</a>
        <a href="facilitator.html" class="nav-btn">Facilitator Information</a>
        <a href="about.html" class="nav-btn">About This Project</a>
      </nav>
    </div>

    <div class="hero-right">
      <img src="images/hero-illustration.png" alt="" class="hero-illustration" aria-hidden="true">
    </div>

  </div>
</main>

<footer>
  A Project by Whitney Polk
</footer>

</body>
</html>
