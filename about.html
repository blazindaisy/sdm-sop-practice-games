<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About This Project — SDM &amp; SOP Practice Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f4ef;
  --bg-card:  #f0ebe3;
  --text:     #2d3142;
  --text-sec: #5c5649;
  --accent:   #8c4a2f;
  --border:   #e0dbd3;
}

body {
  font-family: "Open Sans", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
}

.home-link {
  color: var(--text-sec);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.home-link:hover { color: var(--accent); }

.page-header h1 {
  font-family: "Raleway", sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--accent);
  flex: 1;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

main {
  flex: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 2rem 3rem;
  width: 100%;
  display: flex;
  flex-direction: column;
}

.placeholder-card {
  background: var(--bg-card);
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 3rem 2.5rem;
  text-align: center;
}

.placeholder-card h2 {
  font-family: "Raleway", sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 1rem;
}

.placeholder-card p {
  font-size: 0.9375rem;
  color: var(--text-sec);
  line-height: 1.7;
}

.page-illustration-wrap {
  margin-top: auto;
  padding-top: 2.5rem;
  display: flex;
  justify-content: center;
}

.page-illustration {
  height: 180px;
  width: auto;
  display: block;
  opacity: 0.88;
}

footer {
  text-align: center;
  padding: 1.25rem 1.5rem;
  font-size: 0.75rem;
  color: var(--text-sec);
  border-top: 1px solid var(--border);
}

@media (max-width: 520px) {
  .page-header { padding: 0.875rem 1.25rem; }
  main { padding: 2.5rem 1.25rem 2rem; }
  .page-illustration { height: 130px; }
}
</style>
</head>
<body>

<header class="page-header">
  <a href="index.html" class="home-link">← Home</a>
  <h1>About This Project</h1>
  <span style="width:60px"></span>
</header>

<main>
  <div class="placeholder-card">
    <h2>Coming Soon</h2>
    <p>Background on this project, its purpose, and the work behind it will be shared here.</p>
  </div>

  <div class="page-illustration-wrap">
    <img src="images/hero-illustration.png" alt="" class="page-illustration" aria-hidden="true">
  </div>
</main>

<footer>
  A Project by Whitney Polk &nbsp;&middot;&nbsp; The Structured Decision Making&#8482; (SDM) Model is property of Evident Change
</footer>

</body>
</html>
